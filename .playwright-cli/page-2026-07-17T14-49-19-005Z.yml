    - paragraph [ref=e25]: "Paste this as the description:"
    - generic [ref=e26]:
      - generic [ref=e27]: "I lost 20 minutes at the start of every Claude Code session re-explaining my own project. New window, blank memory, \"so here's what we were doing.\" Every single day. Now it's four words: \"read the file and continue.\" This kit is the system I use to close a session and pick it up later without re-explaining it. It writes a lean checkpoint (target: ~30 lines) when you're done working: the goal, the exact stop point, what got verified, the next step, and the approaches that DIDN'T work (summaries can silently drop those, and then your next session re-runs dead ends you already paid for). The part nobody else ships: the resume is verified. The next session checks your repo's live branch, commit, and dirty files against the checkpoint before it touches anything. In our testing, a fresh session caught a repo that had moved past its handoff and stopped to say so instead of editing files based on stale info. What you get: - The /handoff skill for Claude Code (30-second install, one folder) - A zero-install paste prompt that also works in Cursor and Codex (any agent that can write files in your home folder) - A START-HERE guide with copy buttons on every command - A real example handoff generated during testing, not written by hand - The one-page policy that makes the whole thing work - Honest compatibility notes, including what a handoff can't save You don't need this if you only ever work in single sittings and never close the window mid-project. Everyone else, it's free, so grab it and try the loop once."
      - button "COPY" [ref=e28] [cursor=pointer]
