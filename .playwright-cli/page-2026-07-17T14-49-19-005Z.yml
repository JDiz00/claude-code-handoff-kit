    - paragraph [ref=e54]: "Email 1 · subject: Your first handoff, 5 minutes"
    - generic [ref=e55]:
      - generic [ref=e56]: "You grabbed the Handoff Kit. Here's the fastest way to feel what it does. Don't install anything yet. Open PROMPT.md, copy the block, and paste it at the end of whatever Claude Code session you have open today. It'll write a lean checkpoint (target: ~30 lines) and print a one-line resume command. Tomorrow, open a fresh session and paste that line. Watch it check your repo state, restate the plan in 3 lines, and keep going. That's the whole product. If that loop saves you time, the /handoff skill install is in START-HERE.html. One folder copy, 30 seconds. Just let me know if anything doesn't work on your setup. I read replies."
      - button "COPY" [ref=e57] [cursor=pointer]
    - paragraph [ref=e58]: "Email 2 · subject: Why I don't trust \"resume\" by itself"
    - generic [ref=e59]:
      - generic [ref=e60]: "Claude Code has /resume built in. It reloads your conversation. So why the kit? Because reloading a conversation isn't the same as knowing your repo state. If you (or a teammate, or you in another window) changed the code since that conversation, a resumed session works from stale info and doesn't know it. The kit's handoff carries a state header: branch, commit, dirty-file counts, pulled straight from git when you close out. The fresh session compares that against live git BEFORE touching files. When we tested it, we deliberately committed past the handoff, resumed, and the session's first words were \"Mismatch found,\" with the exact commit it found instead. Then it stopped and asked. That's the difference between notes and a checkpoint that gets checked before it's trusted. Try it: make a handoff, commit something small, then resume and watch it catch the drift."
      - button "COPY" [ref=e61] [cursor=pointer]
    - paragraph [ref=e62]: "Email 3 · subject: The handoff protects one boundary. Here's the other one."
    - generic [ref=e63]:
      - generic [ref=e64]: "The Handoff Kit protects one session boundary. Loop & Goal keeps longer work moving until the proof is printed. If your projects are bigger than one session, the failure mode moves: it's not \"the next session forgot,\" it's \"the work stalled between sessions and nobody noticed.\" Loop & Goal is the system I use for that: a goal file that states what done looks like, and a loop that keeps sessions pointed at it until it's verified. [LINK + UTM] If the handoff loop is already saving you time, this is the same idea stretched across a whole project. And if one session at a time is all you need, the free kit is the whole system, you're done, ignore this."
      - button "COPY" [ref=e65] [cursor=pointer]
