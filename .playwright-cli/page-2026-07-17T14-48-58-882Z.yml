    - paragraph [ref=e36]: One command at the end. One line at the start. That's the whole loop.
    - list [ref=e37]:
      - listitem [ref=e38]: "End your session with /handoff. The skill sweeps for unresolved mistakes (it reports them, it never silently \"fixes\" your code), then writes a lean checkpoint: goal, exact stop point, verification evidence, next action, and every dead end you paid for."
