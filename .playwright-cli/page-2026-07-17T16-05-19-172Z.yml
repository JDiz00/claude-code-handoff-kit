    - paragraph [ref=e18]: One folder copy. Run this from the unzipped kit folder.
    - paragraph [ref=e19]: "First, check for collisions. If you already have a /handoff command or skill, this install would shadow it:"
    - generic [ref=e20]:
      - generic [ref=e21]: ls ~/.claude/skills/ ~/.claude/commands/ 2>/dev/null | grep -i handoff
      - button "COPY" [ref=e22] [cursor=pointer]
    - paragraph [ref=e23]: "Nothing printed? You're clear. Install:"
    - generic [ref=e24]:
      - generic [ref=e25]: mkdir -p ~/.claude/skills && cp -r skill/handoff ~/.claude/skills/
      - button "COPY" [ref=e26] [cursor=pointer]
    - paragraph [ref=e27]: If that skills folder didn't exist before (this is your first skill), restart Claude Code once so it's picked up. Otherwise no restart needed. No config edits, nothing else touched.
    - generic [ref=e28]: "Windows note: the commands on this page are for macOS, Linux, WSL, and Git Bash. On native Windows (PowerShell), install with the command below; the skill still works, it just gathers the git state itself instead of using the bundled script. Details in docs/COMPATIBILITY.md."
    - generic [ref=e29]:
      - generic [ref=e30]: New-Item -ItemType Directory -Force "$env:USERPROFILE\.claude\skills" ; Copy-Item -Recurse skill\handoff "$env:USERPROFILE\.claude\skills\handoff"
      - button "COPY" [ref=e31] [cursor=pointer]
