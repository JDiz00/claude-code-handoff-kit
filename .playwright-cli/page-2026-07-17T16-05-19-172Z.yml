    - paragraph [ref=e40]: "The skill will sweep for unresolved mistakes (it asks before fixing anything), write a lean checkpoint (target: ~30 lines) to ~/.claude/handoffs/, and print your resume line. If a handoff already exists for the project, it keeps one .bak of the old version."
  - generic [ref=e41]:
