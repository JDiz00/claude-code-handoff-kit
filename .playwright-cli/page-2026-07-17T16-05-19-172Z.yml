    - paragraph [ref=e45]: "Open a fresh session in the same project and paste the printed line, e.g.:"
    - generic [ref=e46]:
      - generic [ref=e47]: Read ~/.claude/handoffs/my-project.md and continue
      - button "COPY" [ref=e48] [cursor=pointer]
    - paragraph [ref=e49]: The fresh session checks your repo's live branch, commit, and dirty counts against the handoff's header before touching any files. If someone (including you, in another window) changed the repo since the handoff was written, it reports the mismatch and stops instead of working from stale info. Then it restates Goal / State / Next in 3 lines and starts the next step.
    - generic [ref=e50]: Running two windows on the same repo at the same time? That's a job for git worktrees, not handoffs. The tripwire catches collisions, it can't prevent them.
  - generic [ref=e51]:
    - generic [ref=e52]:
      - generic [ref=e53]: "05"
      - heading "Good habits (the short version)" [level=2] [ref=e54]
    - list [ref=e55]:
      - listitem [ref=e56]: ▸ Hand off at the end of any session you'll continue later, even "in an hour".
      - listitem [ref=e57]: ▸ Never let the ~30-line target trim the Tried/constraints section. Dead ends are the part of your session the repo can't give back.
      - listitem [ref=e58]: ▸ Pointers, not pastes. The handoff records paths and line refs, never file contents.
      - listitem [ref=e59]: ▸ No secrets, tokens, credentials, or customer data in a handoff. Ever.
      - listitem [ref=e60]: ▸ Full rules in docs/POLICY.md, one page.
