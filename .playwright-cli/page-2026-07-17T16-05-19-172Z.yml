    - paragraph [ref=e12]: Open PROMPT.md from this kit, copy the block inside it, and paste it at the end of any Claude Code session. It writes your handoff and prints a one-line resume command. Next session, paste that line. Done.
    - paragraph [ref=e13]: If that loop saves you time, install the skill so it's one command instead of a paste.
